<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input, button {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            word-break: break-all;
        }
        .success {
            border-left-color: #28a745;
            background-color: #d4edda;
        }
        .error {
            border-left-color: #dc3545;
            background-color: #f8d7da;
        }
    </style>
</head>
<body>
    <h1>🔐 前后端加密兼容性测试</h1>
    
    <div class="test-section">
        <h2>前端加密测试</h2>
        <input type="text" id="plainText" placeholder="输入要加密的文本" value="mypassword123">
        <button onclick="testEncrypt()">加密</button>
        <div id="encryptResult" class="result" style="display:none;"></div>
    </div>

    <div class="test-section">
        <h2>模拟登录表单</h2>
        <form id="testForm">
            <input type="text" name="username" placeholder="用户名" value="testuser">
            <input type="password" id="testPassword" name="password" placeholder="密码" value="testpass123">
            <button type="submit">提交（查看加密效果）</button>
        </form>
        <div id="formResult" class="result" style="display:none;"></div>
    </div>

    <div class="test-section">
        <h2>验证说明</h2>
        <ul>
            <li>前端加密使用 AES-256-CBC 模式</li>
            <li>每次加密结果不同（随机IV）</li>
            <li>密文格式：Base64( IV(16字节) + 密文数据 )</li>
            <li>后端可以正确解密并验证</li>
        </ul>
    </div>

    <script src="/lib/crypto-js/crypto-js.min.js"></script>
    <script src="/js/crypto.js"></script>
    <script>
        function testEncrypt() {
            const plainText = document.getElementById('plainText').value;
            const resultDiv = document.getElementById('encryptResult');
            
            if (!plainText) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '❌ 请输入要加密的文本';
                return;
            }
            
            try {
                const encrypted = encryptPassword(plainText);
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <strong>✅ 加密成功</strong><br>
                    <strong>原文:</strong> ${plainText}<br>
                    <strong>密文:</strong> ${encrypted}<br>
                    <strong>长度:</strong> ${encrypted.length} 字符<br>
                    <strong>格式:</strong> Base64编码<br>
                    <em>注意：每次加密结果不同（使用随机IV）</em>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `❌ 加密失败: ${error.message}`;
            }
        }

        // 监听表单提交
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = this.querySelector('[name="username"]').value;
            const passwordField = this.querySelector('[type="password"]');
            const originalPassword = passwordField.value;
            const resultDiv = document.getElementById('formResult');
            
            try {
                const encrypted = encryptPassword(originalPassword);
                
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <strong>✅ 表单提交模拟成功</strong><br>
                    <strong>用户名:</strong> ${username} (明文传输)<br>
                    <strong>原始密码:</strong> ${originalPassword}<br>
                    <strong>加密后密码:</strong> ${encrypted}<br>
                    <br>
                    <strong>实际传输数据:</strong><br>
                    <pre>username=${username}&password=${encrypted}</pre>
                    <em>密码已加密，即使被截获也无法直接获取原文</em>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `❌ 加密失败: ${error.message}`;
            }
        });
    </script>
</body>
</html>
